<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz — Imagine, Crée, Dessine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Archivo+Narrow:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: #f0ebe6; font-family: "Archivo Narrow", sans-serif; color: #301b08; }
.quiz-header { background: #301b08; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.brand { font-family: "Oswald", sans-serif; font-size: 13px; font-weight: 400; color: #eea02d; letter-spacing: 2px; text-transform: uppercase; }
.progress-bar-outer { height: 3px; background: #422918; width: 100%; }
.progress-bar-inner { height: 3px; background: #eea02d; transition: width 0.5s ease; }
.quiz-body { max-width: 620px; margin: 0 auto; padding: 40px 24px 80px; }
.step-label { font-family: "Oswald", sans-serif; font-size: 12px; letter-spacing: 2px; color: #926044; text-transform: uppercase; margin-bottom: 12px; }
.question-title { font-family: "Oswald", sans-serif; font-size: 24px; font-weight: 500; color: #301b08; line-height: 1.25; margin-bottom: 8px; }
.question-subtitle { font-size: 14px; color: #926044; margin-bottom: 20px; line-height: 1.5; }
.question-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; display: block; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn { background: #fff; border: 1.5px solid #e9e1d3; border-radius: 10px; padding: 0; text-align: left; cursor: pointer; font-family: "Archivo Narrow", sans-serif; font-size: 15px; color: #301b08; transition: border-color 0.2s, background 0.2s; display: flex; align-items: stretch; overflow: hidden; }
.option-btn:hover { border-color: #eea02d; background: #fdf6ec; }
.option-btn.selected { border-color: #e2790e; background: #fdf0dc; }
.option-media { width: 80px; min-width: 80px; overflow: hidden; flex-shrink: 0; }
.option-media img { width: 80px; height: 100%; min-height: 72px; object-fit: cover; display: block; }
.option-content { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; flex: 1; }
.opt-check { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 1.5px solid #d4c4b0; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 2px; transition: all 0.2s; color: transparent; flex-shrink: 0; }
.option-btn.selected .opt-check { background: #e2790e; border-color: #e2790e; color: #fff; }
.multi-note { font-size: 13px; color: #926044; margin-bottom: 16px; font-style: italic; }
.open-followup { margin-top: 20px; background: #fff; border-radius: 12px; padding: 18px 20px; border: 1.5px solid #e9e1d3; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.open-followup-label { font-family: "Oswald", sans-serif; font-size: 13px; letter-spacing: 1px; color: #926044; text-transform: uppercase; margin-bottom: 10px; }
.open-followup-textarea { width: 100%; border: 1.5px solid #e9e1d3; border-radius: 8px; padding: 12px 14px; font-family: "Archivo Narrow", sans-serif; font-size: 14px; color: #301b08; background: #f9f5f1; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
.open-followup-textarea:focus { border-color: #eea02d; background: #fff; }
.next-btn { margin-top: 24px; background: #301b08; color: #eea02d; font-family: "Oswald", sans-serif; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; border: none; border-radius: 8px; padding: 14px 32px; cursor: pointer; transition: background 0.2s; width: 100%; }
.next-btn:hover { background: #422918; }
.next-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.open-textarea { width: 100%; border: 1.5px solid #e9e1d3; border-radius: 10px; padding: 14px 16px; font-family: "Archivo Narrow", sans-serif; font-size: 15px; color: #301b08; background: #fff; resize: vertical; min-height: 120px; outline: none; transition: border-color 0.2s; }
.open-textarea:focus { border-color: #eea02d; }
.capture-card { background: #fff; border-radius: 14px; padding: 32px 28px; border: 1.5px solid #e9e1d3; }
.capture-title { font-family: "Oswald", sans-serif; font-size: 22px; font-weight: 500; color: #301b08; margin-bottom: 8px; }
.capture-sub { font-size: 14px; color: #926044; margin-bottom: 24px; line-height: 1.55; }
.field-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.field-input { border: 1.5px solid #e9e1d3; border-radius: 8px; padding: 13px 15px; font-family: "Archivo Narrow", sans-serif; font-size: 15px; color: #301b08; background: #f9f5f1; outline: none; transition: border-color 0.2s; width: 100%; }
.field-input:focus { border-color: #eea02d; background: #fff; }
.field-input::placeholder { color: #bba898; }
.consent-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; cursor: pointer; }
.consent-box { width: 18px; height: 18px; min-width: 18px; border: 1.5px solid #d4c4b0; border-radius: 4px; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: #fff; }
.consent-box.checked { background: #e2790e; border-color: #e2790e; color: #fff; font-size: 11px; }
.consent-text { font-size: 13px; color: #926044; line-height: 1.5; }
.legal { font-size: 12px; color: #b09984; margin-top: 8px; line-height: 1.5; }
.result-header { background: #301b08; border-radius: 14px; padding: 28px 28px 24px; margin-bottom: 16px; }
.result-tag { display: inline-block; background: #eea02d; color: #301b08; font-family: "Oswald", sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; }
.result-title { font-family: "Oswald", sans-serif; font-size: 28px; font-weight: 500; color: #eea02d; margin-bottom: 10px; line-height: 1.2; }
.result-time { font-family: "Oswald", sans-serif; font-size: 17px; color: #f0ebe6; margin-bottom: 14px; line-height: 1.4; }
.hl { color: #eea02d; font-weight: 500; }
.result-body { font-size: 15px; color: #e9e1d3; line-height: 1.65; }
.axes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.axis-pill { background: #f0ebe6; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.axis-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 50%; }
.axis-dot.low { background: #e2790e; } .axis-dot.mid { background: #eea02d; } .axis-dot.high { background: #926044; }
.axis-label { font-size: 13px; color: #301b08; font-weight: 500; }
.axis-val { font-size: 12px; color: #926044; margin-left: auto; }
.result-blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.result-block { background: #fff; border-radius: 12px; padding: 18px 20px; border: 1.5px solid #e9e1d3; }
.block-label { font-family: "Oswald", sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #926044; margin-bottom: 8px; }
.block-text { font-size: 15px; color: #301b08; line-height: 1.7; }
.block-text b { color: #e2790e; font-weight: 500; }
.map-card { border-radius: 14px; overflow: hidden; position: relative; margin-bottom: 16px; }
.map-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 40% 40%, #fdf8ee 0%, #f0e6cc 100%); z-index: 0; }
.map-border { position: absolute; inset: 6px; border: 1px solid rgba(180,140,80,0.35); border-radius: 10px; z-index: 1; pointer-events: none; }
.map-border2 { position: absolute; inset: 12px; border: 0.5px dashed rgba(180,140,80,0.25); border-radius: 7px; z-index: 1; pointer-events: none; }
.map-inner { position: relative; z-index: 2; padding: 24px 28px 28px; }
.map-title { font-family: "Oswald", sans-serif; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: #926044; margin-bottom: 28px; }
.map-track { position: relative; padding-left: 52px; display: flex; flex-direction: column; }
.map-vline { position: absolute; left: 19px; top: 22px; bottom: 22px; width: 0; border-left: 2.5px dashed #c9a870; opacity: 0.8; z-index: 0; }
.map-stop { position: relative; z-index: 1; padding-bottom: 28px; min-height: 48px; }
.map-stop:last-child { padding-bottom: 0; }
.map-dot-col { position: absolute; left: -52px; top: 0; display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; }
.map-dot { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.map-dot.now { background: #e2790e; box-shadow: 0 0 0 4px rgba(226,121,14,0.15); }
.map-dot.mid { background: #fff; border: 2.5px solid #e2790e; color: #e2790e; }
.map-dot.goal { background: #eea02d; box-shadow: 0 0 0 4px rgba(238,160,45,0.18); }
.stop-week { font-family: "Oswald", sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #926044; margin-bottom: 3px; margin-top: 6px; }
.stop-label { font-family: "Oswald", sans-serif; font-size: 15px; font-weight: 500; color: #301b08; margin-bottom: 4px; line-height: 1.2; }
.stop-desc { font-size: 13.5px; color: #6b4226; line-height: 1.55; }
.stop-desc b { color: #e2790e; font-weight: 500; }
.cta-card { background: #e2790e; border-radius: 14px; padding: 28px; text-align: center; margin-bottom: 20px; }
.cta-eyebrow { font-family: "Oswald", sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #fdf0dc; margin-bottom: 10px; opacity: 0.8; }
.cta-title { font-family: "Archivo Narrow", sans-serif; font-size: 16px; color: #fdf0dc; margin-bottom: 16px; line-height: 1.6; text-align: left; }
.cta-title b { font-weight: 500; color: #fff; }
.cta-sub { font-size: 18px; color: #fff; margin-bottom: 20px; line-height: 1.65; text-align: left; font-weight: 500; }
.cta-sub b { color: #fdf0dc; font-style: italic; }
.cta-btn { display: inline-block; background: #301b08; color: #eea02d; font-family: "Oswald", sans-serif; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; border: none; border-radius: 8px; padding: 15px 30px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
.cta-btn:hover { background: #422918; }

/* === Résultats élèves (carrousel témoignages) === */
.rt-section{margin:8px 0 24px;}
.rt-title{font-family:"Oswald",sans-serif;font-weight:600;font-size:21px;letter-spacing:.5px;color:#301b08;text-align:center;margin:0 0 16px;}
.rt-carousel{overflow:hidden;border-radius:16px;transition:height .3s ease;}
.rt-track{display:flex;transition:transform .35s ease;align-items:flex-start;}
.rt-card{min-width:100%;box-sizing:border-box;background:#f0ebe6;border-radius:16px;padding:20px 14px;}
.rt-progress{display:flex;align-items:flex-start;justify-content:center;gap:12px;flex-wrap:wrap;}
.rt-group{display:flex;flex-direction:column;}
.rt-fhead{display:flex;align-items:center;gap:8px;color:#301b08;font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:1.5px;margin-bottom:7px;}
.rt-fhead::before,.rt-fhead::after{content:"";flex:1;height:1px;background:#301b08;}
.rt-fbody{display:flex;gap:10px;align-items:flex-start;justify-content:center;}
.rt-acol{display:flex;flex-direction:column;align-items:center;}
.rt-img{height:200px;width:auto;max-width:100%;display:block;border-radius:4px;}
.rt-cap{font-size:10px;color:#9a8a76;text-align:center;margin:4px 0 0;line-height:1.25;max-width:140px;}
.rt-arrow{color:#e2790e;font-size:24px;font-weight:bold;line-height:1;align-self:center;}
.rt-meta{text-align:center;margin-top:14px;}
.rt-name{font-family:"Oswald",sans-serif;font-weight:500;font-size:18px;color:#301b08;margin:0;}
.rt-badge{display:inline-block;font-size:12px;color:#7a4a12;background:#f4d9a8;padding:3px 12px;border-radius:20px;margin:7px 0 0;}
.rt-badge b{font-weight:700;color:#5a3309;}
.rt-timing{font-weight:600;color:#301b08;font-size:14px;margin:5px auto 0;max-width:450px;line-height:1.5;}
.rt-timing b{font-weight:800;color:#e2790e;}
.rt-quote{font-style:italic;font-size:14px;color:#5c4a38;max-width:460px;line-height:1.55;border-top:1px solid rgba(48,27,8,.18);padding-top:12px;margin:13px auto 0;}
.rt-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px;}
.rt-nav{background:#f0ebe6;color:#301b08;border:none;width:38px;height:38px;border-radius:50%;font-size:22px;line-height:1;cursor:pointer;font-family:"Oswald",sans-serif;}
.rt-nav:hover{background:#e7ded2;}
.rt-dots{display:flex;gap:8px;}
.rt-dot{width:9px;height:9px;border-radius:50%;background:#d8ccbd;cursor:pointer;display:inline-block;}
.rt-dot.active{background:#e2790e;}
@media (max-width:480px){.rt-img{height:135px;}.rt-progress{gap:8px;}.rt-fbody{gap:7px;}.rt-arrow{font-size:20px;}}
/* titre de l'audit plus visible */
.cta-eyebrow{font-size:15px;font-weight:600;opacity:1;color:#ffffff;}
</style>
</head>

let answers={}, currentStep=0, multiSelected=[], consentWhatsapp=false;
const TOTAL_STEPS=QUESTIONS.length+1;

function setProgress(step){ document.getElementById("progress-bar").style.width=Math.round(((step+1)/TOTAL_STEPS)*100)+"%"; }

function computeDiagnosis(){
  const niveau=answers.q1!==undefined?answers.q1:1;
  const regularite=answers.q3!==undefined?answers.q3:0;
  const mental=answers.q4!==undefined?answers.q4:1;
  const dispo=answers.q5!==undefined?answers.q5:1;
  const blocages=answers.q2||[];
  const blocTech=blocages.filter(i=>[0,2].includes(i)).length;
  const blocMental=blocages.filter(i=>[1,3].includes(i)).length;
  const styleIdx=answers.q7!==undefined?answers.q7:1;
  const styleOpt=QUESTIONS[6].options[styleIdx]||QUESTIONS[6].options[1];
  const objIndices=answers.q6||[0];
  const objQ=QUESTIONS[5];
  const objLabels=objIndices.map(i=>objQ.options[i].objLabel).join(", ");
  const primaryObj=objQ.options[objIndices[0]];
  const maxObjExtra=Math.max(...objIndices.map(i=>objQ.options[i].extraWeeks||0));
  const niveauLabel=niveau===0?"compl\u00e8tement d\u00e9butant\u00b7e":niveau===1?"d\u00e9butant\u00b7e avec quelques bases":niveau===2?"interm\u00e9diaire":"interm\u00e9diaire avanc\u00e9\u00b7e";
  const niveauShort=niveau<=1?"D\u00e9butant\u00b7e":niveau===2?"Interm\u00e9diaire":"Interm\u00e9diaire avanc\u00e9\u00b7e";
  let base=niveau===0?[10,14]:niveau===1?[7,11]:niveau===2?[4,8]:[2,5];
  if(dispo===0) base=base.map(x=>x+12);
  else if(dispo===1) base=base.map(x=>x+4);
  else if(dispo===3) base=base.map(x=>Math.max(x-2,2));
  base=base.map(x=>x+maxObjExtra);
  base=base.map(x=>x+(styleOpt.extraWeeks||0));
  if(regularite>=2) base=base.map(x=>Math.max(x-2,2));
  const semMin=base[0],semMax=base[1];
  const duree=semMin===semMax?semMin+" semaines":semMin+" \u00e0 "+semMax+" semaines";
  const jalonS1=Math.max(2,Math.round(semMin*0.22));
  const jalonS2=Math.max(4,Math.round(semMin*0.55));
  const jalon1Desc=primaryObj?primaryObj.jalon1:"poser tes premi\u00e8res lignes avec intention";
  const jalon2Desc=primaryObj?primaryObj.jalon2:"r\u00e9aliser un dessin complet dont tu seras fier\u00b7e";
  const styleStr=styleOpt.styleLabel?" en style "+styleOpt.styleLabel:"";
  const isHardObj=maxObjExtra>=4;
  let niveauObjTexte="";
  if(niveau<=1&&isHardObj) niveauObjTexte="Tu pars d\u2019un niveau <b>"+niveauLabel+"</b>, et ton objectif ("+objLabels+styleStr+") est <b>techniquement ambitieux</b>. C\u2019est une excellente nouvelle\u00a0: avoir un objectif clair, c\u2019est le meilleur moteur qui soit. Le chemin sera progressif, mais <b>chaque \u00e9tape sera d\u00e9j\u00e0 gratifiante</b>. En quelques semaines tu pourras d\u00e9j\u00e0 "+jalon1Desc+", ce qui est d\u00e9j\u00e0 immense quand on part de z\u00e9ro.";
  else if(niveau<=1&&!isHardObj) niveauObjTexte="Tu pars d\u2019un niveau <b>"+niveauLabel+"</b>, et ton objectif ("+objLabels+styleStr+") est <b>tout \u00e0 fait accessible</b> avec la bonne m\u00e9thode. Tu peux esp\u00e9rer des <b>r\u00e9sultats visibles rapidement</b>, et ton objectif final est \u00e0 port\u00e9e en "+duree+".";
  else if(niveau===2&&isHardObj) niveauObjTexte="Tu es <b>interm\u00e9diaire</b>, ce qui est d\u00e9j\u00e0 une belle base. Ton objectif ("+objLabels+styleStr+") n\u00e9cessite encore un travail de fond, mais tu as <b>l\u2019essentiel pour y arriver</b>. En "+duree+", tu peux franchir le cap qui fait la diff\u00e9rence entre \"je me d\u00e9brouille\" et \"je cr\u00e9e vraiment\".";
  else niveauObjTexte="Ton niveau actuel et ton objectif ("+objLabels+styleStr+") sont <b>bien align\u00e9s</b>. Tu as les bases, il te manque la m\u00e9thode et le bon regard. En "+duree+", tu peux atteindre <b>un niveau de fluidit\u00e9 qui va te surprendre</b>.";
  let blocageTexte="";
  if(blocTech>0&&blocMental>0) blocageTexte="Tes freins sont \u00e0 la fois <b>techniques et mentaux</b>. C\u2019est tr\u00e8s courant et \u00e7a s\u2019adresse ensemble\u00a0: souvent, d\u00e9bloquer le technique redonne de la confiance, et la confiance acc\u00e9l\u00e8re le technique.";
  else if(blocTech>0) blocageTexte="Ton frein principal est <b>technique</b>\u00a0: tu manques de rep\u00e8res clairs sur quoi travailler et dans quel ordre. Ce type de blocage se l\u00e8ve <b>rapidement avec une m\u00e9thode structur\u00e9e</b>.";
  else if(blocMental>0) blocageTexte="Ton frein principal est <b>mental</b>\u00a0: confiance, peur du jugement, ou abandon en cours de route. Ce n\u2019est <b>pas une question de talent</b>. C\u2019est une question d\u2019environnement d\u2019apprentissage.";
  else blocageTexte="Tu n\u2019as pas identifi\u00e9 de frein majeur. Ce qui va t\u2019aider, c\u2019est de structurer ta pratique pour que les progr\u00e8s soient <b>visibles et r\u00e9guliers</b>.";
  let mentalTexte="";
  if(mental<=1) mentalTexte="Tu es <b>tr\u00e8s exigeant\u00b7e avec toi-m\u00eame</b>. C\u2019est une force, \u00e0 condition de ne pas laisser le perfectionnisme bloquer ta pratique. Avancer avec des dessins imparfaits, c\u2019est une <b>comp\u00e9tence \u00e0 part enti\u00e8re</b>.";
  else if(mental===2) mentalTexte="Tu cherches \u00e0 comprendre et \u00e0 corriger. C\u2019est <b>une des meilleures dispositions pour progresser</b>\u00a0: tu ne l\u00e2ches pas, tu ajustes.";
  else mentalTexte="Tu as une <b>belle l\u00e9g\u00e8ret\u00e9 face \u00e0 l\u2019erreur</b>. Les personnes qui acceptent d\u2019\u00eatre imparfaites progressent beaucoup plus vite. Garde pr\u00e9cieusement cet \u00e9tat d\u2019esprit.";
  let dispoTexte="";
  if(dispo===0) dispoTexte="<b>30 minutes ou moins par semaine</b>, c\u2019est peu, mais ce n\u2019est pas rien. L\u2019estimation en tient compte s\u00e9rieusement\u00a0: avec ce rythme, chaque session doit \u00eatre <b>tr\u00e8s cibl\u00e9e et sans dispersion</b> pour avancer vraiment.";
  else if(dispo===1) dispoTexte="<b>30 min \u00e0 1h par semaine</b>, c\u2019est honn\u00eate. Avec une m\u00e9thode efficace, \u00e7a suffit pour <b>progresser de fa\u00e7on r\u00e9guli\u00e8re et visible</b>.";
  else if(dispo===2) dispoTexte="<b>1h \u00e0 2h par semaine</b>, c\u2019est un bon rythme. Tu pourras voir des progr\u00e8s clairs, \u00e0 condition de pratiquer plut\u00f4t que regarder des tutos.";
  else dispoTexte="<b>Plus de 2h par semaine</b>, c\u2019est un vrai investissement. Si cette \u00e9nergie est bien orient\u00e9e, les progr\u00e8s peuvent \u00eatre <b>spectaculaires</b>.";
  const diagResume="Niveau:"+niveauShort+"|Dispo:"+dispo+"|R\u00e9gularit\u00e9:"+regularite+"|FreinsTech:"+blocTech+"|FreinsMentaux:"+blocMental+"|Objectif:"+objLabels+"|Style:"+styleOpt.styleLabel+"|Estimation:"+duree;
  return{duree,niveauLabel,niveauShort,niveauObjTexte,blocageTexte,mentalTexte,dispoTexte,niveau,regularite,dispo,blocTech,blocMental,diagResume,jalonS1,jalonS2,jalon1Desc,jalon2Desc,objLabels,styleOpt,styleStr};
}

function makeOptHTML(opt,i,isSel,isMulti){
  const chkStyle=isMulti?"border-radius:4px;":"";
  const media=opt.img?`<div class="option-media"><img src="${opt.img}" alt=""/></div>`:opt.gif?`<div class="option-media"><img src="${opt.gif}" alt=""/></div>`:"";
  return `${media}<div class="option-content"><span class="opt-check" style="${chkStyle}">${isSel?"\u2713":""}</span><span>${opt.label}</span></div>`;
}

function renderStep(){
  if(currentStep===QUESTIONS.length){renderCapture();return;}
  if(currentStep>QUESTIONS.length){renderResult();return;}
  const q=QUESTIONS[currentStep];
  setProgress(currentStep);
  document.getElementById("step-counter").textContent=q.step+" / "+q.total;
  const body=document.getElementById("quiz-body");

  if(q.type==="open"){
    body.innerHTML=`<div class="step-label">Question ${q.step} sur ${q.total}</div><div class="question-title">${q.title}</div><div class="question-subtitle">${q.subtitle}</div><textarea class="open-textarea" id="open-ans" placeholder="\u00c9cris librement..."></textarea><button class="next-btn" id="next-open" style="margin-top:20px;">Continuer</button>`;
    document.getElementById("next-open").addEventListener("click",()=>{answers[q.id]=document.getElementById("open-ans").value.trim();currentStep++;renderStep();});
    return;
  }
  if(q.type==="single"){
    const prev=answers[q.id];
    const topMedia=q.img?`<img class="question-img" src="${q.img}" alt=""/>`:q.gif?`<img class="question-img" src="${q.gif}" alt=""/>`:"";
    body.innerHTML=`<div class="step-label">Question ${q.step} sur ${q.total}</div><div class="question-title">${q.title}</div>${q.subtitle?`<div class="question-subtitle">${q.subtitle}</div>`:""}${topMedia}<div class="options-list" id="opts"></div><button class="next-btn" id="next-single" style="margin-top:24px;" ${prev===undefined?"disabled":""}>Continuer</button>`;
    let selected=prev!==undefined?prev:null;
    const opts=document.getElementById("opts");
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");
      btn.className="option-btn"+(selected===i?" selected":"");
      btn.innerHTML=makeOptHTML(opt,i,selected===i,false);
      btn.addEventListener("click",()=>{selected=i;document.querySelectorAll("#opts .option-btn").forEach((b,j)=>{b.className="option-btn"+(j===i?" selected":"");b.innerHTML=makeOptHTML(q.options[j],j,j===i,false);});document.getElementById("next-single").disabled=false;});
      opts.appendChild(btn);
    });
    document.getElementById("next-single").addEventListener("click",()=>{answers[q.id]=selected;currentStep++;renderStep();});
    return;
  }
  if(q.type==="multi_open"){
    multiSelected=[...(answers[q.id]||[])];
    const topMedia=q.gif?`<img class="question-img" src="${q.gif}" alt=""/>`:"";
    body.innerHTML=`<div class="step-label">Question ${q.step} sur ${q.total}</div><div class="question-title">${q.title}</div><div class="multi-note">${q.subtitle}</div>${topMedia}<div class="options-list" id="opts"></div><div id="followup-wrap"></div><button class="next-btn" id="next-multi-open" style="margin-top:24px;" ${multiSelected.length===0?"disabled":""}>Continuer</button>`;
    const opts=document.getElementById("opts");
    function refreshFollowup(){
      const fw=document.getElementById("followup-wrap");
      if(multiSelected.length>0){if(!document.getElementById("followup-box")){fw.innerHTML=`<div class="open-followup" id="followup-box"><div class="open-followup-label">${q.followupLabel}</div><textarea class="open-followup-textarea" id="followup-text" placeholder="${q.followupPlaceholder}">${answers[q.id+"_open"]||""}</textarea></div>`;}}
      else fw.innerHTML="";
    }
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");
      btn.className="option-btn"+(multiSelected.includes(i)?" selected":"");
      btn.innerHTML=makeOptHTML(opt,i,multiSelected.includes(i),true);
      btn.addEventListener("click",()=>{
        if(multiSelected.includes(i)) multiSelected=multiSelected.filter(x=>x!==i);
        else{if(multiSelected.length>=q.max)return;multiSelected.push(i);}
        document.querySelectorAll("#opts .option-btn").forEach((b,j)=>{const s=multiSelected.includes(j);b.className="option-btn"+(s?" selected":"");b.innerHTML=makeOptHTML(q.options[j],j,s,true);});
        document.getElementById("next-multi-open").disabled=multiSelected.length===0;
        refreshFollowup();
      });
      opts.appendChild(btn);
    });
    refreshFollowup();
    document.getElementById("next-multi-open").addEventListener("click",()=>{answers[q.id]=[...multiSelected];const ft=document.getElementById("followup-text");if(ft)answers[q.id+"_open"]=ft.value.trim();currentStep++;renderStep();});
    return;
  }
  if(q.type==="multiopen"){
    multiSelected=[...(answers[q.id]||[])];
    body.innerHTML=`<div class="step-label">Question ${q.step} sur ${q.total}</div><div class="question-title">${q.title}</div><div class="multi-note">${q.subtitle}</div><div class="options-list" id="opts"></div><button class="next-btn" id="next-mo" style="margin-top:24px;" ${multiSelected.length===0?"disabled":""}>Continuer</button>`;
    const opts=document.getElementById("opts");
    q.options.forEach((opt,i)=>{
      const btn=document.createElement("button");
      btn.className="option-btn"+(multiSelected.includes(i)?" selected":"");
      btn.innerHTML=makeOptHTML(opt,i,multiSelected.includes(i),true);
      btn.addEventListener("click",()=>{
        if(multiSelected.includes(i)) multiSelected=multiSelected.filter(x=>x!==i);
        else multiSelected.push(i);
        document.querySelectorAll("#opts .option-btn").forEach((b,j)=>{const s=multiSelected.includes(j);b.className="option-btn"+(s?" selected":"");b.innerHTML=makeOptHTML(q.options[j],j,s,true);});
        document.getElementById("next-mo").disabled=multiSelected.length===0;
      });
      opts.appendChild(btn);
    });
    document.getElementById("next-mo").addEventListener("click",()=>{answers[q.id]=[...multiSelected];currentStep++;renderStep();});
    return;
  }
}

      <button class="next-btn" id="cap-btn" style="margin-top:16px;" disabled>D\u00e9couvrir mon diagnostic</button>
    </div>`;
  const btn=document.getElementById("cap-btn"),prenom=document.getElementById("cap-prenom"),email=document.getElementById("cap-email"),tel=document.getElementById("cap-tel"),consentBox=document.getElementById("consent-box");
  function checkAll(){btn.disabled=!(prenom.value.trim()&&email.value.includes("@")&&tel.value.trim().length>=8&&consentWhatsapp);}
  prenom.addEventListener("input",checkAll);email.addEventListener("input",checkAll);tel.addEventListener("input",checkAll);
  document.getElementById("consent-row").addEventListener("click",()=>{consentWhatsapp=!consentWhatsapp;consentBox.className="consent-box"+(consentWhatsapp?" checked":"");consentBox.textContent=consentWhatsapp?"\u2713":"";checkAll();});
  btn.addEventListener("click",async()=>{
    btn.disabled=true;btn.textContent="Analyse en cours...";
    const d=computeDiagnosis();
    answers.prenom=prenom.value.trim();
    await submitData(prenom.value.trim(),email.value.trim(),tel.value.trim(),answers,d.diagResume);
    currentStep=QUESTIONS.length+1;renderResult();
  });
}

function renderResult(){

          <div class="map-stop"><div class="map-dot-col"><div class="map-dot mid">\u2726</div></div><div class="stop-week">Semaine ${d.jalonS1}</div><div class="stop-label">Premier cap</div><div class="stop-desc">Tu pourras <b>${d.jalon1Desc}</b>. Un r\u00e9sultat concret, pas juste de la th\u00e9orie.</div></div>
          <div class="map-stop"><div class="map-dot-col"><div class="map-dot mid">\u2726</div></div><div class="stop-week">Semaine ${d.jalonS2}</div><div class="stop-label">Cap interm\u00e9diaire</div><div class="stop-desc">Tu pourras <b>${d.jalon2Desc}</b>. La feuille blanche ne te fera plus peur.</div></div>

        </div>
      </div>
    </div>
    <div class="result-blocks">
      <div class="result-block"><div class="block-label">Ton niveau et ton objectif</div><div class="block-text">${d.niveauObjTexte}</div></div>

    </div>
    <div class="rt-section">
      <p class="rt-title">Leur parcours, bientôt le tien</p>
      <div class="rt-carousel"><div class="rt-track" id="rt-track"><div class="rt-card"><div class="rt-progress"><div class="rt-group"><div class="rt-fhead">AVANT</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/lou-avant.jpg" alt="avant"></div></div></div><div class="rt-arrow">→</div><div class="rt-group"><div class="rt-fhead">APRÈS</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/lou-apres.jpg" alt="après"><p class="rt-cap">Étude d’observation d’après un dessin de Loish</p></div></div></div></div><div class="rt-meta"><p class="rt-name">Lou</p><span class="rt-badge">Niveau de base : <b>grand débutant</b></span><p class="rt-timing">⏱ A réussi à faire ce type de dessin (étude d’observation) en <b>4 mois</b>, avec <b>1 h/semaine</b> en moyenne.</p><p class="rt-quote">« Avant les cours avec Caroline, je n’osais même pas vraiment dessiner… Aujourd’hui, quand je regarde le dessin que je viens de terminer, j’ai presque du mal à croire que c’est moi qui l’ai fait. »</p></div></div><div class="rt-card"><div class="rt-progress"><div class="rt-group"><div class="rt-fhead">AVANT</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/marie-avant.jpg" alt="avant"></div></div></div><div class="rt-arrow">→</div><div class="rt-group"><div class="rt-fhead">APRÈS</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/marie-apres-1.jpg" alt="après"><p class="rt-cap">Dessin d’imagination</p></div><div class="rt-acol"><img class="rt-img" src="images/marie-apres-2.jpg" alt="après"><p class="rt-cap">Dessin d’observation (d’après photo)</p></div></div></div></div><div class="rt-meta"><p class="rt-name">Marie</p><span class="rt-badge">Niveau de base : <b>grande débutante</b></span><p class="rt-timing">⏱ A réussi à faire ce type de dessin (imagination et observation) en <b>5 à 6 mois</b>, avec <b>1 h30/semaine</b> en moyenne.</p><p class="rt-quote">« Je n’avais aucune base, aucune notion : j’osais très peu dessiner et j’étais frustrée. Aujourd’hui je vois mon évolution et je suis déjà très contente de ce que j’ai réalisé grâce à ta méthode. C’est hyper motivant pour continuer. »</p></div></div><div class="rt-card"><div class="rt-progress"><div class="rt-group"><div class="rt-fhead">AVANT</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/jennyfer-avant.jpg" alt="avant"></div></div></div><div class="rt-arrow">→</div><div class="rt-group"><div class="rt-fhead">APRÈS</div><div class="rt-fbody"><div class="rt-acol"><img class="rt-img" src="images/jennyfer-apres-1.jpg" alt="après"><p class="rt-cap">Dessin d’observation</p></div><div class="rt-acol"><img class="rt-img" src="images/jennyfer-apres-2.jpg" alt="après"><p class="rt-cap">Dessin d’imagination</p></div></div></div></div><div class="rt-meta"><p class="rt-name">Jennyfer</p><span class="rt-badge">Niveau de base : <b>débutante</b></span><p class="rt-timing">⏱ A réussi à faire ce type de dessin (imagination et observation) en <b>6 mois</b>, avec <b>1 h/semaine</b> en moyenne.</p><p class="rt-quote">« Les cours avec Caroline sont un vrai plaisir : passionnée, pédagogue et toujours à l’écoute. Son approche bienveillante et ses explications claires m’ont permis de gagner en confiance et de constater une réelle évolution depuis mes débuts. »</p></div></div></div></div>
      <div class="rt-controls"><button class="rt-nav" onclick="rtMove(-1)" aria-label="Précédent">‹</button><div class="rt-dots"><span class="rt-dot active" onclick="rtGo(0)"></span><span class="rt-dot" onclick="rtGo(1)"></span><span class="rt-dot" onclick="rtGo(2)"></span></div><button class="rt-nav" onclick="rtMove(1)" aria-label="Suivant">›</button></div>
    </div>
    <div class="cta-card">
      <div class="cta-eyebrow">Ce que ce diagnostic ne peut pas te dire</div>

      <a class="cta-btn" href="${CALENDLY_URL}" target="_blank">R\u00e9server mon audit dessin gratuit</a>

}
